<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
    <h1>🛠 Admin Dashboard</h1>

    <nav class="nav">
        <a href="/medicines">View Store</a>
        <a href="/login">Logout</a>
    </nav>
</header>

<!-- TITLE -->
<h2 class="title">📊 System Overview</h2>

<div class="container">

    <!-- 🔥 STATS -->
    <div class="stats-grid">

        <div class="stat-card">
            <h3>Total Users</h3>
            <h2 id="totalUsers">0</h2>
        </div>

        <div class="stat-card">
            <h3>Total Orders</h3>
            <h2 id="totalOrders">0</h2>
        </div>

        <div class="stat-card">
            <h3>Products</h3>
            <h2 id="totalProducts">0</h2>
        </div>

        <div class="stat-card highlight">
            <h3>Total Sales</h3>
            <h2 id="totalSales">₹0</h2>
        </div>

    </div>

    <!-- 🔥 MANAGEMENT -->
    <div class="admin-grid">

        <div class="admin-card">
            <h3>👤 Users</h3>
            <button onclick="loadUsers()" class="btn btn-primary">Load Users</button>
            <div id="usersList" class="list-box"></div>
        </div>

        <div class="admin-card">
            <h3>💊 Products</h3>
            <button onclick="loadProducts()" class="btn btn-primary">Load Products</button>
            <div id="productsList" class="list-box"></div>
        </div>

        <div class="admin-card">
            <h3>📦 Orders</h3>
            <button onclick="loadOrders()" class="btn btn-primary">Load Orders</button>
            <div id="ordersList" class="list-box"></div>
        </div>

        <div class="admin-card">
            <h3>📈 Sales</h3>
            <button onclick="loadSales()" class="btn btn-secondary">View Report</button>
            <div id="salesList" class="list-box"></div>
        </div>

    </div>

</div>

<script src="/js/api.js"></script>

<script>

/* ===== USERS ===== */
function loadUsers() {
    fetch(API + "/users/all")
    .then(res => res.json())
    .then(data => {
        document.getElementById("totalUsers").innerText = data.length;

        let html = "";
        data.forEach(u => {
            html += `<div class="list-item">${u.fullName} (${u.email})</div>`;
        });
        document.getElementById("usersList").innerHTML = html;
    });
}

/* ===== PRODUCTS ===== */
function loadProducts() {
    fetch(API + "/medicines")
    .then(res => res.json())
    .then(data => {
        document.getElementById("totalProducts").innerText = data.length;

        let html = "";
        data.forEach(p => {
            html += `<div class="list-item">${p.name} - ₹${p.price}</div>`;
        });
        document.getElementById("productsList").innerHTML = html;
    });
}

/* ===== ORDERS ===== */
function loadOrders() {
    fetch(API + "/orders/1")
    .then(res => res.json())
    .then(data => {

        document.getElementById("totalOrders").innerText = data.length;

        let total = 0;
        let html = "";

        data.forEach(o => {
            total += o.totalAmount;
            html += `<div class="list-item">Order #${o.id} - ₹${o.totalAmount}</div>`;
        });

        document.getElementById("ordersList").innerHTML = html;
        document.getElementById("totalSales").innerText = "₹" + total;
    });
}

/* ===== SALES ===== */
function loadSales() {
    document.getElementById("salesList").innerHTML =
        `<div class="list-item">Sales calculated above 👆</div>`;
}

</script>

</body>
</html>
